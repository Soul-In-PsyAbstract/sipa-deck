<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPA OS — Ecosystem Overview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

  /* Omma iframe — full screen */
  #omma-frame {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    z-index: 1;
  }

  /* Brain hook overlay — top right */
  #brain-hook {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 180px;
    height: 180px;
    z-index: 100;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(0, 255, 255, 0.4);
    box-shadow:
      0 0 30px rgba(0, 255, 255, 0.3),
      0 0 60px rgba(130, 0, 255, 0.2),
      inset 0 0 30px rgba(0,0,0,0.5);
    animation: brain-float 4s ease-in-out infinite;
    cursor: pointer;
  }

  #brain-hook img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    animation: brain-spin 12s linear infinite;
    filter: saturate(1.4) brightness(1.1);
  }

  #brain-hook:hover {
    box-shadow:
      0 0 50px rgba(0, 255, 255, 0.6),
      0 0 100px rgba(130, 0, 255, 0.4);
    transform: scale(1.08);
    transition: all 0.3s ease;
  }

  /* Pulse ring */
  #brain-hook::before {
    content: '';
    position: absolute;
    top: -8px; left: -8px;
    right: -8px; bottom: -8px;
    border-radius: 50%;
    border: 1px solid rgba(0, 255, 255, 0.2);
    animation: pulse-ring 2s ease-out infinite;
    z-index: -1;
  }
  #brain-hook::after {
    content: 'SIPA AI CORE';
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: rgba(0, 255, 255, 0.7);
    white-space: nowrap;
    font-family: monospace;
  }

  @keyframes brain-float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  @keyframes brain-spin {
    from { transform: rotate(0deg) scale(1.15); }
    to { transform: rotate(360deg) scale(1.15); }
  }
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.3); opacity: 0; }
  }
</style>
</head>
<body>

<iframe
  id="omma-frame"
  src="https://omma.build/p/soul-in-psyabstract-sipa-ecosystem-overv-wifrzg"
  allowfullscreen
  allow="autoplay; fullscreen"
></iframe>

<div id="brain-hook">
  <img
    src="https://img.recraft.ai/qzDiTlfsh4hvTlIoF8_25_zGPwbwwich-YxQ_zT6kmc/rs:fit:1024:1024:0/raw:1/plain/abs://external/images/cfa43df2-303e-45e8-9915-cdd24c7355fa"
    alt="SIPA AI Neural Core"
  >
</div>

</body>
</html>
