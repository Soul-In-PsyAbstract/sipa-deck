<style>
  :root{
    --ink:#0a0a0c; --ink-2:#111114;
    --mint:#b7dec5; --mint-dim:#b7dec533;
    --text-dim:#6b6f76;
    --logo-w: 6667; --logo-h: 2666.8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--ink); color:#e8e8ea;
    font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; min-height:100vh;
  }

  .stage{
    position:relative; width:min(90vw,900px); aspect-ratio:6667/2666.8;
    display:flex; align-items:center; justify-content:center;
  }

  /* ── scan line ── */
  .scan{
    position:absolute; top:50%; left:0; width:0%; height:2px;
    background:linear-gradient(90deg, transparent, var(--mint), transparent);
    box-shadow:0 0 20px 2px var(--mint);
    transform:translateY(-50%);
    animation: scanGrow 1.6s cubic-bezier(.6,0,.4,1) 0.6s forwards;
    z-index:3;
  }
  @keyframes scanGrow{
    0%{ width:0%; opacity:0 }
    8%{ opacity:1 }
    100%{ width:100%; opacity:0 }
  }

  /* ── logo wrap ── */
  .logo-wrap{
    position:relative; width:100%;
    opacity:0;
    filter: drop-shadow(0 0 0px var(--mint));
    animation:
      logoReveal 0.9s ease-out 1.7s forwards,
      logoGlow 3.2s ease-in-out 2.6s infinite,
      logoBreathe 4.2s ease-in-out 2.6s infinite;
  }
  .logo-wrap svg{ display:block; width:100%; height:auto; overflow:visible }
  .logo-wrap svg path{ fill:#eef3f0 }
  .logo-wrap svg path[fill="#fff"]{ fill:#0a0a0c }

  @keyframes logoReveal{
    0%{ opacity:0; clip-path: inset(0 100% 0 0) }
    100%{ opacity:1; clip-path: inset(0 0% 0 0) }
  }
  @keyframes logoGlow{
    0%,100%{ filter: drop-shadow(0 0 0px var(--mint)) }
    50%{ filter: drop-shadow(0 0 14px var(--mint-dim)) }
  }
  @keyframes logoBreathe{
    0%,100%{ transform: scale(1) }
    50%{ transform: scale(1.012) }
  }

  /* ── underline accent ── */
  .underline{
    position:absolute; left:50%; bottom:-6%;
    width:0%; height:3px; background:var(--mint);
    transform:translateX(-50%);
    box-shadow:0 0 12px 1px var(--mint);
    animation: underlineGrow 0.7s ease-out 3.6s forwards;
  }
  @keyframes underlineGrow{
    0%{ width:0% }
    100%{ width:38% }
  }

  /* ── tagline ── */
  .tagline{
    position:absolute; left:50%; bottom:-14%;
    transform:translateX(-50%);
    font-size:clamp(.6rem, 1.4vw, .82rem);
    letter-spacing:.42em; text-transform:uppercase;
    color:var(--text-dim); white-space:nowrap;
    opacity:0;
    animation: taglineFade 1s ease-out 4.3s forwards;
  }
  @keyframes taglineFade{
    0%{ opacity:0; transform:translate(-50%, 6px) }
    100%{ opacity:1; transform:translate(-50%, 0) }
  }

  /* ── footer meta (not part of exported video, just this preview page) ── */
  .meta{
    position:fixed; bottom:1.4rem; left:0; right:0;
    text-align:center; font-size:.68rem; color:#3a3a40; letter-spacing:.08em;
  }
  .meta a{ color:var(--mint) }

  @media (prefers-reduced-motion: reduce){
    .scan,.logo-wrap,.underline,.tagline{ animation-duration:.01ms !important; animation-delay:0s !important }
  }
</style>
